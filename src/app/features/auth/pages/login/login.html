<main class="grow flex items-center justify-center p-6 min-h-screen bg-slate-950">

    <div
        class="w-full max-w-5xl flex flex-col lg:flex-row bg-surface rounded-2xl overflow-hidden shadow-2xl border border-outline-variant/10">

        <!-- Lado Izquierdo -->
        <div class="hidden lg:flex lg:w-1/2 p-12 flex-col justify-between relative bg-slate-900">
            <div class="absolute inset-0 bg-linear-to-br from-primary/20 to-transparent z-0"></div>
            <div class="relative z-10">
                <h1 class="text-4xl font-bold text-primary mb-4">DevDuo</h1>
                <p class="text-on-surface-variant text-lg max-w-sm">Soluciones arquitectónicas para la web moderna.
                    Accede a tu centro de control.</p>
            </div>

            <div class="relative z-10 p-6 bg-surface-container-low rounded-xl border border-outline-variant/10">
                <div class="flex items-center gap-3 mb-2 text-primary font-bold">
                    <span class="material-symbols-outlined">terminal</span> Sistema Online
                </div>
                <div class="text-on-surface-variant flex items-center gap-2 text-sm">
                    <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span> Todos los nodos operativos
                </div>
            </div>
        </div>

        <!-- Lado Derecho: Formulario -->
        <div class="w-full lg:w-1/2 p-8 md:p-12 bg-surface">

            <!-- Selector de Pestañas con Angular -->
            <div class="flex border-b border-outline-variant/20 mb-10">
                <button (click)="switchTab('login')" [class.text-primary]="activeTab === 'login'"
                    [class.border-b-2]="activeTab === 'login'" [class.border-primary]="activeTab === 'login'"
                    class="flex-1 pb-4 font-bold text-on-surface-variant transition-all">
                    Iniciar Sesión
                </button>
                <button (click)="switchTab('register')" [class.text-primary]="activeTab === 'register'"
                    [class.border-b-2]="activeTab === 'register'" [class.border-primary]="activeTab === 'register'"
                    class="flex-1 pb-4 font-semibold text-on-surface-variant transition-all">
                    Registrarse
                </button>
            </div>

            <!-- LOGIN -->
            <div [class.hidden]="activeTab !== 'login'" class="animate-fade-in">
                <h2 class="text-3xl font-bold mb-2">Bienvenido de nuevo</h2>

                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-2">Correo Electrónico</label>
                        <input
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 px-4 outline-none focus:border-primary"
                            placeholder="ejemplo@correo.com" type="email" />
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-medium text-on-surface-variant">Contraseña</label>
                            <a href="#" class="text-sm text-primary hover:underline">¿Olvidaste tu clave?</a>
                        </div>
                        <input
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 px-4 outline-none focus:border-primary"
                            placeholder="••••••••" type="password" />
                    </div>
                </form>

                <div class="mt-8">
                    <div
                        class="relative flex items-center justify-center text-sm mb-6 text-on-surface-variant before:border-t before:border-outline-variant/20 before:grow before:mr-4 after:border-t after:border-outline-variant/20 after:grow after:ml-4">
                        O continuar con
                    </div>
                    <button
                        class="w-full py-3 rounded-lg border border-outline-variant/30 hover:bg-surface-container-high transition flex items-center justify-center gap-3 font-semibold">
                        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-5 h-5" alt="Google">
                        Google
                    </button>
                </div>
            </div>

            <!-- REGISTRO -->
            <div [class.hidden]="activeTab !== 'register'" class="animate-fade-in">
                <h2 class="text-3xl font-bold mb-2">Nueva Identidad</h2>
                <p class="text-on-surface-variant mb-6">Regístrate para acceso de cliente externo.</p>

                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-1">Correo Electrónico</label>
                        <input
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-2.5 px-4 outline-none focus:border-primary"
                            placeholder="cliente@empresa.com" type="email" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-1">Contraseña</label>
                        <input
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-2.5 px-4 outline-none focus:border-primary"
                            placeholder="Crear contraseña" type="password" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-1">Confirmar
                            Contraseña</label>
                        <input
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-2.5 px-4 outline-none focus:border-primary"
                            placeholder="Repetir contraseña" type="password" />
                    </div>
                    <button
                        class="w-full bg-primary text-on-primary font-bold py-3.5 rounded-lg mt-4 border-2 border-primary/50 hover:border-primary transition shadow-lg">
                        Crear Cuenta
                    </button>
                </form>
            </div>

        </div>
    </div>
</main>
