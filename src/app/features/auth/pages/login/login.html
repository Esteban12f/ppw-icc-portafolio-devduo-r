<main class="grow flex items-center justify-center p-6 min-h-screen bg-slate-950">
    <div class="w-full max-w-lg flex flex-col bg-surface rounded-2xl overflow-hidden shadow-2xl border border-outline-variant/10">

        <div class="w-full p-8 md:p-12 bg-surface">

            <div class="flex border-b border-outline-variant/20 mb-10">
                <button (click)="switchTab('login')" [class.text-primary]="activeTab === 'login'"
                    [class.border-b-2]="activeTab === 'login'" [class.border-primary]="activeTab === 'login'"
                    class="flex-1 pb-4 font-bold text-on-surface-variant transition-all">
                    Iniciar Sesión
                </button>
                <button (click)="switchTab('register')" [class.text-primary]="activeTab === 'register'"
                    [class.border-b-2]="activeTab === 'register'" [class.border-primary]="activeTab === 'register'"
                    class="flex-1 pb-4 font-semibold text-on-surface-variant transition-all">
                    Registrarse
                </button>
            </div>

            <div [class.hidden]="activeTab !== 'login'" class="animate-fade-in">
                <h2 class="text-3xl font-bold mb-2">Bienvenido de nuevo</h2>

                <form class="space-y-6" (ngSubmit)="handleAuth()">
                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-2">Correo Electrónico</label>
                        <input 
                            name="email" 
                            [(ngModel)]="email"
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 px-4 outline-none focus:border-primary"
                            placeholder="ejemplo@correo.com" type="email" required />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-2">Contraseña</label>
                        <input 
                            name="password" 
                            [(ngModel)]="password"
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 px-4 outline-none focus:border-primary"
                            placeholder="••••••••" type="password" required />
                    </div>

                    <button type="submit"
                        class="w-full bg-primary text-on-primary font-bold py-3 rounded-lg mt-2 border-2 border-primary/50 hover:border-primary transition shadow-lg">
                        Ingresar
                    </button>
                </form>

                <div class="mt-8">
                    <div class="relative flex items-center justify-center text-sm mb-6 text-on-surface-variant before:border-t before:border-outline-variant/20 before:grow before:mr-4 after:border-t after:border-outline-variant/20 after:grow after:ml-4">
                        O continuar con
                    </div>
                    <button 
                        type="button" 
                        (click)="loginWithGoogle()"
                        class="w-full py-3 rounded-lg border border-outline-variant/30 hover:bg-surface-container-high transition flex items-center justify-center gap-3 font-semibold">
                        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-5 h-5" alt="Google">
                        Google
                    </button>
                </div>
            </div>

            <div [class.hidden]="activeTab !== 'register'" class="animate-fade-in">
                <h2 class="text-3xl font-bold mb-2">Nueva Identidad</h2>
                <p class="text-on-surface-variant mb-6">Regístrate para acceso de cliente externo.</p>

                <form class="space-y-4" (ngSubmit)="handleAuth()">
                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-1">Correo Electrónico</label>
                        <input 
                            name="regEmail" 
                            [(ngModel)]="email"
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-2.5 px-4 outline-none focus:border-primary"
                            placeholder="cliente@empresa.com" type="email" required />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-1">Contraseña</label>
                        <input 
                            name="regPassword" 
                            [(ngModel)]="password"
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-2.5 px-4 outline-none focus:border-primary"
                            placeholder="Crear contraseña" type="password" required />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-on-surface-variant mb-1">Confirmar Contraseña</label>
                        <input 
                            name="regConfirm" 
                            [(ngModel)]="confirmPassword"
                            class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-2.5 px-4 outline-none focus:border-primary"
                            placeholder="Repetir contraseña" type="password" required />
                    </div>
                    <button 
                        type="submit"
                        class="w-full bg-primary text-on-primary font-bold py-3.5 rounded-lg mt-4 border-2 border-primary/50 hover:border-primary transition shadow-lg">
                        Crear Cuenta
                    </button>
                </form>
            </div>

        </div>
    </div>
</main>
